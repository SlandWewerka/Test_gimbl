<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weebil-S Controller v1.1.4</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    body.dark-mode {
      background: #1a1a1a;
      color: #e0e0e0;
    }

    .container {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 280px;
      background: #fff;
      border-right: 1px solid #e0e0e0;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      box-shadow: 2px 0 4px rgba(0,0,0,0.05);
    }

    body.dark-mode .sidebar {
      background: #2a2a2a;
      border-right: 1px solid #3a3a3a;
    }

    .sidebar h2 {
      margin: 0 0 1.5rem;
      font-size: 18px;
      font-weight: 500;
    }

    #presetsList {
      flex: 1;
      margin-bottom: 1.5rem;
    }

    .preset-item {
      padding: 10px;
      margin-bottom: 8px;
      background: #f9f9f9;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    body.dark-mode .preset-item {
      background: #333;
      border: 1px solid #444;
    }

    .preset-item-info {
      flex: 1;
    }

    .preset-item-name {
      margin: 0 0 4px;
      font-weight: 500;
    }

    .preset-item-coords {
      margin: 0;
      font-size: 12px;
      opacity: 0.7;
    }

    .preset-item-delete {
      padding: 4px 8px;
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      margin-left: 8px;
    }

    .preset-item-delete:hover {
      background: #ff5252;
    }

    .sidebar-buttons {
      display: flex;
      gap: 8px;
      margin-top: 1rem;
    }

    .sidebar-buttons button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    #newPresetBtn {
      background: #4299e1;
      color: white;
    }

    #newPresetBtn:hover {
      background: #3182ce;
    }

    #deleteAllBtn {
      background: #fc8181;
      color: white;
    }

    #deleteAllBtn:hover {
      background: #f56565;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 2rem;
      overflow-y: auto;
      background: #fafafa;
    }

    body.dark-mode .main {
      background: #1a1a1a;
    }

    .header {
      margin-bottom: 2rem;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .header-top h1 {
      font-size: 28px;
      font-weight: 500;
    }

    #connectBtn {
      padding: 10px 20px;
      background: #48bb78;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    #connectBtn:hover {
      background: #38a169;
    }

    #connectBtn.connected {
      background: #fc8181;
    }

    #connectBtn.connected:hover {
      background: #f56565;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .info-card {
      background: white;
      padding: 1rem;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
    }

    body.dark-mode .info-card {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
    }

    .info-card p:first-child {
      font-size: 13px;
      opacity: 0.6;
      margin: 0 0 4px;
    }

    .info-card p:last-child {
      font-size: 16px;
      font-weight: 500;
      margin: 0;
    }

    .position-card {
      background: white;
      padding: 1.5rem;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      margin-bottom: 2rem;
    }

    body.dark-mode .position-card {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
    }

    .position-card h3 {
      margin: 0 0 1rem;
      font-size: 16px;
      font-weight: 500;
    }

    .position-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    .position-item p:first-child {
      font-size: 12px;
      opacity: 0.6;
      margin: 0 0 6px;
    }

    .position-item p:last-child {
      font-size: 20px;
      font-weight: 500;
      margin: 0;
      color: #4299e1;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 2rem;
      align-items: flex-end;
    }

    .control-group {
      flex: 0 0 auto;
    }

    .control-group label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      opacity: 0.7;
    }

    .control-group select,
    .control-group input {
      padding: 8px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      background: white;
      color: #333;
      font-size: 14px;
    }

    body.dark-mode .control-group select,
    body.dark-mode .control-group input {
      background: #2a2a2a;
      color: #e0e0e0;
      border: 1px solid #3a3a3a;
    }

    #duration {
      width: 80px;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: 12px;
    }

    .preset-btn {
      aspect-ratio: 1;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      transition: all 0.2s;
      color: #666;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px;
      word-break: break-word;
    }

    body.dark-mode .preset-btn {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #aaa;
    }

    .preset-btn:hover {
      border-color: #4299e1;
      box-shadow: 0 0 0 2px rgba(66, 153, 225, 0.1);
    }

    .preset-btn.saved {
      background: #4299e1;
      color: white;
      border-color: #4299e1;
    }

    .preset-btn.saved:hover {
      background: #3182ce;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #e0e0e0;
        max-height: 200px;
      }

      .main {
        padding: 1rem;
      }

      .header-top h1 {
        font-size: 22px;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      .position-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
      <h2>Presets</h2>
      <div id="presetsList"></div>
      <div class="sidebar-buttons">
        <button id="newPresetBtn">New Preset</button>
        <button id="deleteAllBtn">Clear All</button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main">
      <!-- Header -->
      <div class="header">
        <div class="header-top">
          <h1>Weebil-S Controller v1.1.4</h1>
          <button id="connectBtn">Connect</button>
        </div>

        <!-- Status Info -->
        <div class="info-grid">
          <div class="info-card">
            <p>Status</p>
            <p id="statusText">Disconnected</p>
          </div>
          <div class="info-card">
            <p>Battery</p>
            <p id="batteryText">--</p>
          </div>
          <div class="info-card">
            <p>Mode</p>
            <p id="modeText">--</p>
          </div>
        </div>
      </div>

      <!-- Position Feedback -->
      <div class="position-card">
        <h3>Current Position</h3>
        <div class="position-grid">
          <div class="position-item">
            <p>Tilt</p>
            <p id="tiltDisplay">0°</p>
          </div>
          <div class="position-item">
            <p>Pan</p>
            <p id="panDisplay">0°</p>
          </div>
          <div class="position-item">
            <p>Roll</p>
            <p id="rollDisplay">0°</p>
          </div>
        </div>
      </div>

      <!-- Move Status -->
      <div id="moveStatus" style="display:none;margin-bottom:1.5rem;">
        <span id="moveStatusBadge" style="display:inline-block;padding:6px 16px;border-radius:20px;font-size:14px;font-weight:500;"></span>
      </div>

      <!-- Controls -->
      <div class="controls">
        <div class="control-group">
          <label>Grid size</label>
          <select id="gridSize">
            <option value="3">3x3 (9 buttons)</option>
            <option value="4">4x4 (16 buttons)</option>
          </select>
        </div>
        <div class="control-group">
          <label>Move duration (seconds)</label>
          <input type="number" id="duration" value="2" min="0.5" max="10" step="0.5">
        </div>
      </div>

      <!-- Joystick Controls -->
      <div style="margin-bottom:1.5rem;">
        <p style="font-size:13px;opacity:0.6;margin-bottom:8px;">Hold to move — then long-press a grid button to save position</p>
        <div style="display:flex;gap:12px;flex-wrap:wrap;">
          <div>
            <p style="font-size:12px;opacity:0.6;margin-bottom:4px;">Tilt</p>
            <div style="display:flex;gap:6px;">
              <button id="tiltUp"   style="padding:12px 20px;border:1px solid #e0e0e0;border-radius:8px;background:white;cursor:pointer;font-size:18px;">▲</button>
              <button id="tiltDown" style="padding:12px 20px;border:1px solid #e0e0e0;border-radius:8px;background:white;cursor:pointer;font-size:18px;">▼</button>
            </div>
          </div>
          <div>
            <p style="font-size:12px;opacity:0.6;margin-bottom:4px;">Pan</p>
            <div style="display:flex;gap:6px;">
              <button id="panLeft"  style="padding:12px 20px;border:1px solid #e0e0e0;border-radius:8px;background:white;cursor:pointer;font-size:18px;">◄</button>
              <button id="panRight" style="padding:12px 20px;border:1px solid #e0e0e0;border-radius:8px;background:white;cursor:pointer;font-size:18px;">►</button>
            </div>
          </div>
          <div>
            <p style="font-size:12px;opacity:0.6;margin-bottom:4px;">Roll</p>
            <div style="display:flex;gap:6px;">
              <button id="rollLeft"  style="padding:12px 20px;border:1px solid #e0e0e0;border-radius:8px;background:white;cursor:pointer;font-size:18px;">↺</button>
              <button id="rollRight" style="padding:12px 20px;border:1px solid #e0e0e0;border-radius:8px;background:white;cursor:pointer;font-size:18px;">↻</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Button Grid -->
      <div class="button-grid" id="buttonGrid"></div>

      <!-- Debug Log -->
      <div style="margin-top:2rem;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <button onclick="document.getElementById('debugPanel').style.display = document.getElementById('debugPanel').style.display === 'none' ? 'block' : 'none'" style="padding:6px 12px;border:1px solid #e0e0e0;border-radius:6px;background:white;cursor:pointer;font-size:13px;">Toggle Debug Log</button>
          <div style="display:flex;gap:6px;">
            <button onclick="navigator.clipboard.writeText(document.getElementById('debugLog').innerText).then(()=>alert('Copied!'))" style="padding:6px 12px;border:1px solid #e0e0e0;border-radius:6px;background:white;cursor:pointer;font-size:13px;">Copy</button>
            <button onclick="document.getElementById('debugLog').innerHTML=''" style="padding:6px 12px;border:1px solid #e0e0e0;border-radius:6px;background:white;cursor:pointer;font-size:13px;">Clear</button>
          </div>
        </div>
        <div id="debugPanel" style="display:none;">
          <div id="debugLog" style="background:#111;color:#0f0;font-family:monospace;font-size:11px;padding:12px;border-radius:8px;height:200px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- Debug log ---
    function debugLog(msg, type = 'info') {
      const log = document.getElementById('debugLog');
      if (!log) return;
      const colors = { tx: '#4fc3f7', rx: '#81c784', err: '#ef9a9a', info: '#fff176' };
      const time = new Date().toLocaleTimeString('en', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
      log.innerHTML += `<span style="color:${colors[type]}">[${time}][${type.toUpperCase()}] ${msg}</span>\n`;
      log.scrollTop = log.scrollHeight;
    }

    // --- Move status ---
    function setMoveStatus(text, color) {
      const wrap  = document.getElementById('moveStatus');
      const badge = document.getElementById('moveStatusBadge');
      if (!text) { wrap.style.display = 'none'; return; }
      badge.textContent = text;
      badge.style.background = color;
      badge.style.color = 'white';
      wrap.style.display = 'block';
    }

    // --- State ---
    let gimbalCharacteristic = null;
    let writeCharacteristic = null;
    let isConnected = false;
    let cmdCounter = 0;
    let currentRaw = { tilt: 32767, pan: 32767, roll: 32767 };
    let positionPollInterval = null;
    let presets = {};
    let gridSize = 3;
    let isMoving = false;

    // --- DOM refs ---
    const connectBtn    = document.getElementById('connectBtn');
    const statusText    = document.getElementById('statusText');
    const batteryText   = document.getElementById('batteryText');
    const modeText      = document.getElementById('modeText');
    const tiltDisplay   = document.getElementById('tiltDisplay');
    const panDisplay    = document.getElementById('panDisplay');
    const rollDisplay   = document.getElementById('rollDisplay');
    const gridSizeSelect= document.getElementById('gridSize');
    const buttonGrid    = document.getElementById('buttonGrid');
    const newPresetBtn  = document.getElementById('newPresetBtn');
    const deleteAllBtn  = document.getElementById('deleteAllBtn');
    const presetsList   = document.getElementById('presetsList');

    // --- BLE write queue (serialises all writes — prevents GATT-busy errors) ---
    let bleWriteQueue = Promise.resolve();
    function bleWrite(cmd) {
      bleWriteQueue = bleWriteQueue.then(async () => {
        if (!writeCharacteristic) return;
        try {
          await writeCharacteristic.writeValueWithoutResponse(cmd);
        } catch (e) {
          debugLog(`BLE err: ${e.message}`, 'err');
        }
      });
      return bleWriteQueue;
    }

    // --- Request / response matching ---
    let pendingResponses = {};
    function sendAndWait(cmdId, data, timeoutMs = 2000) {
      return new Promise(async (resolve) => {
        const timer = setTimeout(() => {
          delete pendingResponses[cmdId];
          resolve(null); // timed out — no response came
        }, timeoutMs);
        pendingResponses[cmdId] = (arg) => {
          clearTimeout(timer);
          resolve(arg);
        };
        await bleWrite(buildCommand(cmdId, data));
      });
    }

    // --- CRC-16/XMODEM ---
    function calculateCRC(data) {
      let crc = 0;
      for (let i = 0; i < data.length; i++) {
        crc ^= data[i] << 8;
        for (let j = 0; j < 8; j++) {
          crc <<= 1;
          if (crc & 0x10000) crc ^= 0x1021;
        }
      }
      return crc & 0xFFFF;
    }

    // Build command — CRC covers bytes[4..end-3] = [0x18,0x12, inc, 0x01, cmd, ...data]
    // This matches the bleebil reference implementation (outputArray.slice(4))
    function buildCommand(cmdId, data = [0, 0, 0]) {
      const prefix = [0x24, 0x3c, 0x08, 0x00, 0x18, 0x12];
      cmdCounter = (cmdCounter + 1) & 0xFF;
      const header = [cmdCounter, 0x01, cmdId, ...data];
      const crcData = [0x18, 0x12, ...header]; // include 18 12 per spec
      const crc = calculateCRC(crcData);
      return new Uint8Array([...prefix, ...header, crc & 0xFF, (crc >> 8) & 0xFF]);
    }

    // --- Incoming data handler ---
    function handleGimbalData(event) {
      const bytes = Array.from(new Uint8Array(event.target.value.buffer));
      const raw = bytes.map(b => b.toString(16).padStart(2, '0')).join(' ');
      debugLog(`RX ${raw}`, 'rx');

      if (bytes.length < 6 || bytes[0] !== 0x24 || bytes[1] !== 0x3e) return;

      // Heartbeat packet [18 15] — contains mode & axis-lock status, NOT position
      if (bytes[4] === 0x18 && bytes[5] === 0x15 && bytes.length >= 10) {
        const mode = bytes[8];
        const lockByte = bytes[9];
        const modeNames = { 0: 'PF', 1: 'L', 2: 'F', 3: 'POV', 4: 'GO' };
        modeText.textContent = modeNames[mode] ?? `0x${mode.toString(16)}`;
        debugLog(`HB mode=${modeNames[mode] ?? mode} lockByte=0x${lockByte.toString(16)}`, 'info');
        return;
      }

      // Command response [18 12]
      if (bytes[4] === 0x18 && bytes[5] === 0x12 && bytes.length >= 12) {
        const cmdId = bytes[8];
        const arg = bytes.slice(9, bytes.length - 2); // strip 2 CRC bytes at end
        const argHex = arg.map(b => b.toString(16).padStart(2, '0')).join('');
        debugLog(`RSP cmd=0x${cmdId.toString(16).padStart(2,'0')} arg=${argHex}`, 'info');

        // Battery: cmd 0x06 query, response arg=[0x00, battPct]
        // Raw value is 0-255 range; convert to 0-100%
        if (cmdId === 0x06 && arg.length >= 2 && arg[0] === 0x00) {
          const raw = arg[1];
          const pct = raw > 100 ? Math.round(raw / 255 * 100) : raw;
          batteryText.textContent = `${pct}%`;
        }

        // Resolve pending sendAndWait
        if (pendingResponses[cmdId]) {
          pendingResponses[cmdId](arg);
          delete pendingResponses[cmdId];
        }
      }
    }

    // --- Position query (sends 0x22/0x24/0x23 and awaits responses) ---
    async function queryPosition() {
      if (!isConnected) return;
      try {
        // arg = [0x00, posLo, posHi]  (per blog spec)
        const tiltArg = await sendAndWait(0x22, [0, 0, 0]);
        const panArg  = await sendAndWait(0x24, [0, 0, 0]);
        const rollArg = await sendAndWait(0x23, [0, 0, 0]);

        if (tiltArg && tiltArg.length >= 3) currentRaw.tilt = tiltArg[1] | (tiltArg[2] << 8);
        if (panArg  && panArg.length  >= 3) currentRaw.pan  = panArg[1]  | (panArg[2]  << 8);
        if (rollArg && rollArg.length >= 3) currentRaw.roll = rollArg[1] | (rollArg[2] << 8);

        updatePositionDisplay();
        debugLog(`POS T=0x${currentRaw.tilt.toString(16)} P=0x${currentRaw.pan.toString(16)} R=0x${currentRaw.roll.toString(16)}`, 'info');
      } catch (e) {
        debugLog(`queryPosition err: ${e.message}`, 'err');
      }
    }

    function updatePositionDisplay() {
      const toDeg = v => ((v / 65535 * 360) - 180).toFixed(1);
      tiltDisplay.textContent = `${toDeg(currentRaw.tilt)}°`;
      panDisplay.textContent  = `${toDeg(currentRaw.pan)}°`;
      rollDisplay.textContent = `${toDeg(currentRaw.roll)}°`;
    }

    // --- Connect / Disconnect ---
    async function connect() {
      try {
        const device = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true,
          optionalServices: ['0000fee9-0000-1000-8000-00805f9b34fb']
        });
        const server  = await device.gatt.connect();
        const service = await server.getPrimaryService('0000fee9-0000-1000-8000-00805f9b34fb');
        gimbalCharacteristic = await service.getCharacteristic('d44bc439-abfd-45a2-b575-925416129601');
        writeCharacteristic  = await service.getCharacteristic('d44bc439-abfd-45a2-b575-925416129600');

        isConnected = true;
        bleWriteQueue = Promise.resolve(); // fresh queue on each connect
        cmdCounter = 0;
        pendingResponses = {};

        gimbalCharacteristic.addEventListener('characteristicvaluechanged', handleGimbalData);
        await gimbalCharacteristic.startNotifications();

        updateConnectionUI(true);
        debugLog(`Connected to ${device.name}`, 'info');
        debugLog('Notifications started', 'info');

        // Query battery then initial position, then poll every 3s
        await bleWrite(buildCommand(0x06, [0, 0, 0]));
        setTimeout(() => queryPosition(), 800);
        positionPollInterval = setInterval(() => queryPosition(), 1000);

      } catch (error) {
        debugLog(`Connect error: ${error.message}`, 'err');
        alert('Failed to connect: ' + error.message);
      }
    }

    function disconnect() {
      isConnected = false;
      gimbalCharacteristic = null;
      writeCharacteristic = null;
      pendingResponses = {};
      if (positionPollInterval) { clearInterval(positionPollInterval); positionPollInterval = null; }
      updateConnectionUI(false);
    }

    function updateConnectionUI(connected) {
      if (connected) {
        statusText.textContent = 'Connected';
        statusText.style.color = '#48bb78';
        connectBtn.textContent = 'Disconnect';
        connectBtn.classList.add('connected');
      } else {
        statusText.textContent = 'Disconnected';
        statusText.style.color = '';
        batteryText.textContent = '--';
        modeText.textContent = '--';
        connectBtn.textContent = 'Connect';
        connectBtn.classList.remove('connected');
      }
    }

    // --- Presets ---
    function loadPresets() {
      const saved = localStorage.getItem('weebilPresets');
      if (saved) { try { presets = JSON.parse(saved); } catch (e) { presets = {}; } }
    }

    function savePresets() {
      localStorage.setItem('weebilPresets', JSON.stringify(presets));
    }

    function createButtonGrid() {
      buttonGrid.innerHTML = '';
      const total = gridSize * gridSize;
      for (let i = 0; i < total; i++) {
        const btn = document.createElement('button');
        btn.className = 'preset-btn';
        const key = `preset_${i}`;
        btn.innerHTML = presets[key] ? (presets[key].name || `P${i+1}`) : `${i+1}`;
        if (presets[key]) btn.classList.add('saved');

        btn.addEventListener('click', () => handlePresetClick(i));
        btn.addEventListener('contextmenu', e => { e.preventDefault(); handlePresetSave(i); });

        let pressTimer;
        btn.addEventListener('touchstart',  () => { pressTimer = setTimeout(() => handlePresetSave(i), 600); });
        btn.addEventListener('touchend',    () => clearTimeout(pressTimer));
        btn.addEventListener('touchmove',   () => clearTimeout(pressTimer));
        btn.addEventListener('touchcancel', () => clearTimeout(pressTimer));

        buttonGrid.appendChild(btn);
      }
    }

    function handlePresetClick(index) {
      if (isMoving) return;
      const preset = presets[`preset_${index}`];
      if (preset) moveToPreset(preset.rawTilt, preset.rawPan, preset.rawRoll);
    }

    async function handlePresetSave(index) {
      if (isConnected) {
        debugLog('Querying position before save…', 'info');
        await queryPosition();
      }
      const key  = `preset_${index}`;
      const name = prompt('Preset name:', presets[key]?.name || `Position ${index+1}`);
      if (name !== null) {
        presets[key] = { name, rawTilt: currentRaw.tilt, rawPan: currentRaw.pan, rawRoll: currentRaw.roll };
        savePresets();
        createButtonGrid();
        updatePresetsList();
      }
    }

    async function sendTarget(tilt, pan, roll) {
      await bleWrite(buildCommand(0x06, [0x10, tilt & 0xFF, (tilt >> 8) & 0xFF]));
      await bleWrite(buildCommand(0x08, [0x10, pan  & 0xFF, (pan  >> 8) & 0xFF]));
      await bleWrite(buildCommand(0x07, [0x10, roll & 0xFF, (roll >> 8) & 0xFF]));
    }

    async function moveToPreset(tilt, pan, roll) {
      if (!isConnected) { alert('Not connected'); return; }
      if (isMoving) return;
      isMoving = true;
      setMoveStatus('Moving', '#4299e1');

      const durationSec = parseFloat(document.getElementById('duration').value) || 2;
      const durationMs  = durationSec * 1000;
      const STEP_MS     = 50;  // one step every 50ms = 20Hz
      const steps       = Math.max(1, Math.round(durationMs / STEP_MS));

      debugLog(`>MOVE T=0x${tilt.toString(16)} P=0x${pan.toString(16)} over ${durationSec}s (${steps} steps)`, 'info');

      // Pause background poll during move
      if (positionPollInterval) { clearInterval(positionPollInterval); positionPollInterval = null; }

      // Snapshot start position for interpolation
      const startTilt = currentRaw.tilt;
      const startPan  = currentRaw.pan;
      const startRoll = currentRaw.roll;

      // Interpolate from current to target over duration
      for (let i = 1; i <= steps; i++) {
        const t  = i / steps;
        const iT = Math.round(startTilt + (tilt - startTilt) * t);
        const iP = Math.round(startPan  + (pan  - startPan)  * t);
        const iR = Math.round(startRoll + (roll - startRoll) * t);
        await sendTarget(iT, iP, iR);
        if (i < steps) await new Promise(r => setTimeout(r, STEP_MS));
      }

      setMoveStatus('Overshoot protection', '#ed8936');

      // Correction loop: poll at ~10Hz, re-command if still off by > 1°
      const THRESHOLD    = 182; // ~1° in raw units (65535/360)
      const STABLE_NEEDED = 3;
      const TIMEOUT_MS   = durationMs + 500;
      let stable = 0;
      const deadline = Date.now() + TIMEOUT_MS;

      while (Date.now() < deadline) {
        await new Promise(r => setTimeout(r, 100));
        await queryPosition();

        const tDiff = Math.abs(currentRaw.tilt - tilt);
        const pDiff = Math.abs(currentRaw.pan  - pan);

        if (tDiff <= THRESHOLD && pDiff <= THRESHOLD) {
          if (++stable >= STABLE_NEEDED) {
            debugLog(`SETTLED`, 'info');
            break;
          }
        } else {
          stable = 0;
          debugLog(`CORRECT Terr=${tDiff} Perr=${pDiff} — resend`, 'info');
          await sendTarget(tilt, pan, roll);
        }
      }

      // Resume background poll
      positionPollInterval = setInterval(() => queryPosition(), 1000);
      isMoving = false;
      setMoveStatus('Done', '#48bb78');
      setTimeout(() => setMoveStatus(null), 2000);
    }

    function updatePresetsList() {
      presetsList.innerHTML = '';
      Object.entries(presets).forEach(([key, preset]) => {
        const div  = document.createElement('div');
        div.className = 'preset-item';

        const info = document.createElement('div');
        info.className = 'preset-item-info';

        const nameEl = document.createElement('p');
        nameEl.className = 'preset-item-name';
        nameEl.textContent = preset.name;

        const coords = document.createElement('p');
        coords.className = 'preset-item-coords';
        coords.textContent = `T:0x${(preset.rawTilt??0).toString(16).padStart(4,'0')} P:0x${(preset.rawPan??0).toString(16).padStart(4,'0')} R:0x${(preset.rawRoll??0).toString(16).padStart(4,'0')}`;

        info.appendChild(nameEl);
        info.appendChild(coords);

        const delBtn = document.createElement('button');
        delBtn.className = 'preset-item-delete';
        delBtn.textContent = 'Delete';
        delBtn.onclick = () => { delete presets[key]; savePresets(); createButtonGrid(); updatePresetsList(); };

        div.appendChild(info);
        div.appendChild(delBtn);
        presetsList.appendChild(div);
      });
    }

    // --- Joystick ---
    // From bleebil source: SP_FORWARD=[0x10,0x2C,0x01], SP_REVERSE=[0x10,0x2C,0x11]
    // tiltUp=REVERSE(0x11), tiltDown=FORWARD(0x01)
    // panLeft=FORWARD(0x01), panRight=REVERSE(0x11)
    // rollCW=FORWARD(0x01), rollCCW=REVERSE(0x11)
    let joystickTimers = {};

    function sendJoystick(cmdId, dir) {
      if (!isConnected) return;
      debugLog(`JOY 0x${cmdId.toString(16)} dir=0x${dir.toString(16)}`, 'tx');
      bleWrite(buildCommand(cmdId, [0x10, 0x2C, dir]));
    }

    function stopJoystick(cmdId) {
      if (!isConnected) return;
      bleWrite(buildCommand(cmdId, [0x10, 0x00, 0x00]));
      setTimeout(() => queryPosition(), 600); // refresh position after move
    }

    function bindJoystick(btnId, cmdId, dir) {
      const btn = document.getElementById(btnId);
      if (!btn) return;

      const start = (e) => {
        e.preventDefault();
        if (joystickTimers[btnId]) return;
        sendJoystick(cmdId, dir);
        joystickTimers[btnId] = setInterval(() => sendJoystick(cmdId, dir), 100);
      };
      const stop = () => {
        if (!joystickTimers[btnId]) return;
        clearInterval(joystickTimers[btnId]);
        delete joystickTimers[btnId];
        stopJoystick(cmdId);
      };

      btn.addEventListener('mousedown',   start);
      btn.addEventListener('touchstart',  start, { passive: false });
      btn.addEventListener('mouseup',     stop);
      btn.addEventListener('mouseleave',  stop);
      btn.addEventListener('touchend',    stop);
      btn.addEventListener('touchcancel', stop);
    }

    bindJoystick('tiltUp',    0x01, 0x11); // REVERSE = tilt up
    bindJoystick('tiltDown',  0x01, 0x01); // FORWARD = tilt down
    bindJoystick('panLeft',   0x02, 0x01); // FORWARD = pan left
    bindJoystick('panRight',  0x02, 0x11); // REVERSE = pan right
    bindJoystick('rollLeft',  0x03, 0x11); // REVERSE = roll CCW (↺)
    bindJoystick('rollRight', 0x03, 0x01); // FORWARD = roll CW  (↻)

    // --- Event listeners ---
    connectBtn.addEventListener('click', () => isConnected ? disconnect() : connect());

    gridSizeSelect.addEventListener('change', e => {
      gridSize = parseInt(e.target.value);
      createButtonGrid();
    });

    newPresetBtn.addEventListener('click', async () => {
      if (isConnected) await queryPosition();
      const name = prompt('Preset name:');
      if (name) {
        const index = Object.keys(presets).length;
        presets[`preset_${index}`] = { name, rawTilt: currentRaw.tilt, rawPan: currentRaw.pan, rawRoll: currentRaw.roll };
        savePresets();
        createButtonGrid();
        updatePresetsList();
      }
    });

    deleteAllBtn.addEventListener('click', () => {
      if (confirm('Delete all presets?')) {
        presets = {};
        savePresets();
        createButtonGrid();
        updatePresetsList();
      }
    });

    // --- Init ---
    loadPresets();
    createButtonGrid();
    updatePresetsList();
  </script>
</body>
</html>
